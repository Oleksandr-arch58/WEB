<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Info — Вход в аккаунт</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo">MLBB Info</div>

      <div class="auth-header">
        <h1 id="authTitle">Добро пожаловать</h1>
        <p id="authSubtitle">Введите данные для входа</p>
      </div>

      <!-- УВЕДОМЛЕНИЕ О СТАТУСЕ СЕРВЕРА -->
      <div id="serverStatus" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 16px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; font-size: 12px;"></div>

      <!-- Вкладки -->
      <div class="tabs">
        <button class="tab-button active" data-tab="login">Вход</button>
        <button class="tab-button" data-tab="register">Регистрация</button>
      </div>

      <!-- ВКЛАДКА ВХОДА -->
      <div class="tab-content active" id="login-tab">
        <div id="loginMessage"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginUsername">Логин:</label>
            <input 
              type="text" 
              id="loginUsername" 
              placeholder="Введите ваш логин"
              autocomplete="username"
              required
            >
          </div>
          <div class="form-group">
            <label for="loginPassword">Пароль:</label>
            <input 
              type="password" 
              id="loginPassword" 
              placeholder="Введите ваш пароль"
              autocomplete="current-password"
              required
            >
          </div>
          <button type="submit" class="btn-primary">Войти</button>
        </form>
      </div>

      <!-- ВКЛАДКА РЕГИСТРАЦИИ -->
      <div class="tab-content" id="register-tab">
        <div id="registerMessage"></div>
        <form id="registerForm">
          <div class="form-group">
            <label for="registerUsername">Логин:</label>
            <input 
              type="text" 
              id="registerUsername" 
              placeholder="Минимум 3 символа"
              autocomplete="username"
              required
            >
          </div>
          <div class="form-group">
            <label for="registerPassword">Пароль:</label>
            <input 
              type="password" 
              id="registerPassword" 
              placeholder="Минимум 6 символов"
              autocomplete="new-password"
              required
            >
          </div>
          <div class="form-group">
            <label for="registerPasswordConfirm">Повторите пароль:</label>
            <input 
              type="password" 
              id="registerPasswordConfirm" 
              placeholder="Повторите пароль"
              autocomplete="new-password"
              required
            >
          </div>
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>
      </div>

    </div>
  </div>

  <!-- СКРИПТЫ -->
  <script src="js/auth.js"></script>
  <script>
    // ==================== УПРАВЛЕНИЕ ВКЛАДКАМИ ====================
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        // Удалить активный класс со всех кнопок и содержимого
        tabButtons.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));

        // Добавить активный класс текущей кнопке и содержимому
        button.classList.add('active');
        const tabName = button.getAttribute('data-tab');
        document.getElementById(`${tabName}-tab`).classList.add('active');

        // Обновить заголовок
        if (tabName === 'login') {
          document.getElementById('authTitle').textContent = 'Добро пожаловать';
          document.getElementById('authSubtitle').textContent = 'Введите данные для входа';
        } else {
          document.getElementById('authTitle').textContent = 'Новый аккаунт';
          document.getElementById('authSubtitle').textContent = 'Создайте свой аккаунт';
        }
      });
    });

    // ==================== ОБРАБОТКА ВХОДА ====================
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      // Очистить предыдущее сообщение
      loginMessage.innerHTML = '';

      // Попытка входа
      const result = await loginUser(username, password);

      // Показать сообщение
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${result.success ? 'success' : 'error'}`;
      messageDiv.textContent = result.message;
      loginMessage.appendChild(messageDiv);

      if (result.success) {
        // Успешный вход - перенаправить на главную или на страницу из параметра returnTo
        setTimeout(() => {
          const urlParams = new URLSearchParams(window.location.search);
          const returnTo = urlParams.get('returnTo') || 'index.html';
          window.location.href = returnTo;
        }, 1500);
      } else {
        // Очистить пароль при ошибке
        document.getElementById('loginPassword').value = '';
      }
    });

    // ==================== ОБРАБОТКА РЕГИСТРАЦИИ ====================
    const registerForm = document.getElementById('registerForm');
    const registerMessage = document.getElementById('registerMessage');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('registerUsername').value;
      const password = document.getElementById('registerPassword').value;
      const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

      // Очистить предыдущее сообщение
      registerMessage.innerHTML = '';

      // Проверка совпадения паролей
      if (password !== passwordConfirm) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Пароли не совпадают';
        registerMessage.appendChild(messageDiv);
        return;
      }

      // Попытка регистрации
      const result = await registerUser(username, password);

      // Показать сообщение
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${result.success ? 'success' : 'error'}`;
      messageDiv.textContent = result.message;
      registerMessage.appendChild(messageDiv);

      if (result.success) {
        // Успешная регистрация - очистить форму и перейти на вкладку входа
        setTimeout(() => {
          registerForm.reset();
          document.querySelector('[data-tab="login"]').click();
          // Заполнить логин в форме входа
          document.getElementById('loginUsername').value = username;
          document.getElementById('loginPassword').focus();
        }, 1500);
      }
    });

    // ==================== ПЕРЕНАПРАВЛЕНИЕ ЕСЛИ АВТОРИЗОВАН ====================
    // Если пользователь уже авторизован, перенаправить на главную страницу
    const hasToken = localStorage.getItem('authToken');
    const hasUser = localStorage.getItem('currentUser');
    
    if (hasToken && hasUser) {
      console.log('✅ Уже авторизован, перенаправление на index.html');
      window.location.href = 'index.html';
    } else {
      console.log('⚠️ На страице входа, авторизация требуется');
    }
  </script>
</body>
</html>
